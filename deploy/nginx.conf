# Arachne marketing site — nginx server block.
# Copy to /etc/nginx/sites-available/arachne-site, symlink into
# sites-enabled, then `nginx -t && systemctl reload nginx`.
#
# TLS: run `certbot --nginx -d arachne.example.com -d www.arachne.example.com`
# once the DNS A/AAAA records point at this VPS. Certbot rewrites the
# server blocks below to add the 443 listener + redirect.

server {
    listen 80;
    listen [::]:80;
    server_name arachne.example.com www.arachne.example.com;

    root /var/www/arachne-site;
    index index.html;

    # Long-cache hashed assets (Astro fingerprints filenames in /_astro/).
    location /_astro/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # HTML is cheap and changes on deploy — keep it fresh.
    location / {
        try_files $uri $uri/ $uri.html /index.html;
        add_header Cache-Control "public, max-age=0, must-revalidate";
    }

    # Compression (brotli requires the ngx_brotli module; gzip is built-in).
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types
        text/plain text/css application/javascript application/json
        image/svg+xml application/xml;

    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Don't serve dotfiles.
    location ~ /\.(?!well-known) {
        deny all;
    }
}
